{% extends "base.html" %}

{% block title %}JamSession Lab · Bad Request{% endblock %}

{% block content %}
    <section class="flex min-h-[70vh] items-center bg-jam-black py-16 sm:py-24">
        <div class="mx-auto max-w-xl px-4 text-center sm:px-6 lg:px-8" data-aos="fade-up">
            <div class="mx-auto flex h-24 w-24 items-center justify-center rounded-full border-2 border-jam-red bg-jam-grey">
                <span class="text-2xl font-black text-jam-red">400</span>
            </div>

            <h1 class="mt-8 text-3xl font-extrabold tracking-tight text-jam-white sm:text-4xl">
                Bad Request
            </h1>
            <p class="mt-4 text-base leading-relaxed text-jam-muted-on-grey">
                Something about your request wasn't quite right. Please check the
                details and try again.
            </p>

            <a
                href="{% url 'pages:home' %}"
                class="mt-8 inline-flex items-center justify-center rounded-xl bg-jam-red px-8 py-3.5 text-base font-bold text-jam-black shadow-lg shadow-jam-red/20 transition hover:bg-jam-red-hover focus:outline-none focus:ring-2 focus:ring-jam-red focus:ring-offset-2 focus:ring-offset-jam-black"
            >
                Back to Homepage
            </a>
        </div>
    </section>
{% endblock %}
