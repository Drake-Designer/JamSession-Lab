{% comment %}
  Branded HTML email shell for JamSession Lab.
  Inline CSS is required here: most email clients strip <style> blocks
  and ignore linked stylesheets. Do not refactor this into a .css file.

  Important: do NOT use multi-line {# #} comments — Django does not strip
  them and they leak into the sent HTML (breaking Gmail rendering).
{% endcomment %}
<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="supported-color-schemes" content="dark">
    <title>{% block title %}JamSession Lab{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#000000;font-family:Inter,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#000000;width:100%;">
        <tr>
            <td align="center" style="padding:32px 16px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;">

                    {# Brand header #}
                    <tr>
                        <td align="center" style="padding:0 0 28px 0;">
                            {% if logo_url %}
                            <a href="{{ site_url }}" style="text-decoration:none;">
                                <img
                                    src="{{ logo_url }}"
                                    alt="JamSession Lab"
                                    width="180"
                                    height="48"
                                    style="display:block;width:180px;height:auto;border:0;outline:none;"
                                >
                            </a>
                            {% else %}
                            <a href="{{ site_url }}" style="font-size:22px;font-weight:800;letter-spacing:0.02em;color:#FFFFFF;text-decoration:none;">
                                JamSession Lab
                            </a>
                            {% endif %}
                        </td>
                    </tr>

                    {# Accent bar #}
                    <tr>
                        <td style="height:3px;line-height:3px;font-size:0;background-color:#E63946;">&nbsp;</td>
                    </tr>

                    {# Content card #}
                    <tr>
                        <td style="background-color:#1A1A1A;border:1px solid #262626;border-top:0;padding:36px 28px 32px 28px;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>

                    {# Footer #}
                    <tr>
                        <td align="center" style="padding:28px 12px 8px 12px;">
                            <p style="margin:0 0 8px 0;font-size:13px;line-height:1.5;color:#A3A3A3;">
                                &copy; {% now "Y" %} JamSession Lab. All rights reserved.
                            </p>
                            <p style="margin:0;font-size:12px;line-height:1.5;color:#737373;">
                                Organising jam sessions across Ireland.
                                {% if site_url %}
                                <a href="{{ site_url }}" style="color:#E63946;text-decoration:underline;">Visit the site</a>
                                {% endif %}
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
