{% extends "base.html" %}

{% block title %}JamSession Lab · Password updated{% endblock %}

{% block content %}
    <section class="bg-jam-black py-16 sm:py-24">
        <div class="page-shell page-shell--narrow">
            <div class="rounded-2xl border border-jam-grey-light bg-jam-grey p-6 sm:p-8" data-aos="fade-up">
                <header class="page-header page-header--center mb-6">
                    <h1 class="page-header__title">Password updated</h1>
                    <p class="page-header__lead">
                        Your password has been changed successfully. You can now sign
                        in with your new password.
                    </p>
                </header>

                <div class="text-center">
                    <a
                        href="{% url 'accounts:login' %}"
                        class="inline-flex w-full items-center justify-center rounded-xl bg-jam-red px-8 py-3.5 text-base font-bold text-jam-black shadow-lg shadow-jam-red/20 transition hover:bg-jam-red-hover focus:outline-none focus:ring-2 focus:ring-jam-red focus:ring-offset-2 focus:ring-offset-jam-grey sm:w-auto"
                    >
                        Sign in
                    </a>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
