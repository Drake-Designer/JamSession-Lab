{% extends "base.html" %}

{% block title %}JamSession Lab — Registrations closed{% endblock %}

{% block content %}
    <section class="bg-jam-black py-16 sm:py-24">
        <div class="mx-auto max-w-xl px-4 sm:px-6 lg:px-8">
            <div class="rounded-2xl border border-jam-grey-light bg-jam-grey p-6 sm:p-8" data-aos="fade-up">
                <h1 class="text-2xl font-bold text-jam-red">Registrations are currently closed</h1>
                <p class="mt-4 text-jam-muted-on-grey">
                    Registrations for
                    <span class="font-semibold text-jam-white">{{ event.title }}</span>
                    are not open at the moment.
                </p>
                <a
                    href="{% url 'events:detail' event.pk %}"
                    class="mt-8 inline-flex items-center justify-center rounded-xl border border-jam-grey-light px-6 py-3 text-base font-semibold text-jam-white"
                >
                    Back to event
                </a>
            </div>
        </div>
    </section>
{% endblock %}
