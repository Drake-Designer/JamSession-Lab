{% extends "base.html" %}

{% block title %}JamSession Lab — Already registered{% endblock %}

{% block content %}
    <section class="bg-jam-black py-16 sm:py-24">
        <div class="mx-auto max-w-xl px-4 sm:px-6 lg:px-8">
            <div class="rounded-2xl border border-jam-grey-light bg-jam-grey p-6 sm:p-8" data-aos="fade-up">
                <h1 class="text-2xl font-bold text-jam-red">You are already registered</h1>
                <p class="mt-4 text-jam-muted-on-grey">
                    You are already registered for
                    <span class="font-semibold text-jam-white">{{ event.title }}</span>.
                </p>
                <div class="mt-8 flex flex-wrap gap-3">
                    <a
                        href="{% url 'events:register_confirmation' event.pk %}"
                        class="inline-flex items-center justify-center rounded-xl bg-jam-red px-6 py-3 text-base font-bold text-jam-black"
                    >
                        View registration
                    </a>
                    <form method="post" action="{% url 'events:cancel' event.pk %}">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{% url 'events:detail' event.pk %}">
                        <button
                            type="submit"
                            class="inline-flex items-center justify-center rounded-xl border border-jam-grey-light px-6 py-3 text-base font-semibold text-jam-white"
                        >
                            Cancel registration
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
