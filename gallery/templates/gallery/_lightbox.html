{# Shared gallery lightbox shell. Requires gallery.css + gallery.js on the page. #}
<div
    id="gallery-lightbox"
    class="gallery-lightbox"
    role="dialog"
    aria-modal="true"
    aria-hidden="true"
    aria-label="Media viewer"
>
    <button type="button" class="gallery-lightbox__close" aria-label="Close media viewer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
    </button>

    <button type="button" class="gallery-lightbox__nav gallery-lightbox__nav--prev" aria-label="Previous item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="m15 18-6-6 6-6"/>
        </svg>
    </button>

    <div class="gallery-lightbox__dialog">
        <div class="gallery-lightbox__stage">
            <img class="gallery-lightbox__image" alt="" hidden>
            <video class="gallery-lightbox__video" controls playsinline preload="auto" hidden></video>
        </div>
        <div class="gallery-lightbox__meta">
            <p class="gallery-lightbox__title" hidden></p>
            <p class="gallery-lightbox__caption" hidden></p>
            <p class="gallery-lightbox__credit" hidden></p>
        </div>
    </div>

    <button type="button" class="gallery-lightbox__nav gallery-lightbox__nav--next" aria-label="Next item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="m9 18 6-6-6-6"/>
        </svg>
    </button>
</div>
